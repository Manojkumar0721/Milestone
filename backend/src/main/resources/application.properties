spring.application.name=milestone

# ---------------------------------------------------------------------------
# Database: MySQL. Set MYSQL_URL for the full JDBC URL (e.g. Aiven/PlanetScale),
# or set DB_HOST / DB_PORT / DB_NAME / DB_USER / DB_PASSWORD individually.
# ---------------------------------------------------------------------------
spring.datasource.url=${MYSQL_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:milestone}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:Manojkumary@07}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=${PORT:8080}

# ---------------------------------------------------------------------------
# JWT (override in real deployments via env vars APP_JWT_SECRET / APP_JWT_TTL).
# Secret must be long enough for HS256 (>= 32 bytes).
# ---------------------------------------------------------------------------
app.jwt.secret=${APP_JWT_SECRET:change-me-this-is-a-dev-only-secret-key-please-override-0123456789}
app.jwt.ttl-ms=${APP_JWT_TTL:86400000}

# Allowed origin for the Vite frontend during dev
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:5175,http://127.0.0.1:5175,http://localhost:5176,http://127.0.0.1:5176}
